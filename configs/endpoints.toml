# Endpoint registry for `prime eval run`.
#
# Each `[[endpoint]]` is an OpenAI-compatible (or Anthropic-compatible) inference
# server. The `key` field is the NAME of an environment variable holding the API
# key (not the key itself). Use `--endpoint <id>` on the prime CLI to pick one.
#
# Local: `prime eval run glyphbench -m Qwen/Qwen3.5-4B --endpoint local-qwen35-4b ...`
# Hosted (Prime Inference): set `PRIME_API_KEY` and use any of the `pinference.ai` ids.
# OpenAI: set `OPENAI_API_KEY` and use the `gpt-*` ids.
# Anthropic: set `ANTHROPIC_API_KEY` and use `haiku`/`sonnet`/`opus`.

# ---------------------------------------------------------------------------
# Local vLLM (default smoke target). Start the server with:
#   uv run vllm serve Qwen/Qwen3.5-4B --port 8000 --max-model-len 16384
# ---------------------------------------------------------------------------

[[endpoint]]
endpoint_id = "local-qwen35-4b"
model = "Qwen/Qwen3.5-4B"
url = "http://localhost:8000/v1"
key = "OPENAI_API_KEY_LOCAL"
type = "openai_chat_completions"

[[endpoint]]
endpoint_id = "local-qwen35-9b"
model = "Qwen/Qwen3.5-9B"
url = "http://localhost:8000/v1"
key = "OPENAI_API_KEY_LOCAL"
type = "openai_chat_completions"

[[endpoint]]
endpoint_id = "local-qwen3-0p6b"
model = "Qwen/Qwen3-0.6B"
url = "http://localhost:8000/v1"
key = "OPENAI_API_KEY_LOCAL"
type = "openai_chat_completions"

[[endpoint]]
endpoint_id = "local-qwen3-4b"
model = "Qwen/Qwen3-4B"
url = "http://localhost:8000/v1"
key = "OPENAI_API_KEY_LOCAL"
type = "openai_chat_completions"

[[endpoint]]
endpoint_id = "local-qwen3-8b"
model = "Qwen/Qwen3-8B"
url = "http://localhost:8000/v1"
key = "OPENAI_API_KEY_LOCAL"
type = "openai_chat_completions"

# Generic catch-all if you serve a different model on :8000 — pass `-m <id>`
# explicitly on the CLI; the endpoint just provides the URL + key wiring.
[[endpoint]]
endpoint_id = "local"
model = "any"
url = "http://localhost:8000/v1"
key = "OPENAI_API_KEY_LOCAL"
type = "openai_chat_completions"

