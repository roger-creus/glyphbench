# Foundation smoke config: run all 5 pilot envs with a vLLM-served model.
# Adjust base_url and model_id for your local setup.
run_id: "foundation-smoke"
provider: vllm
model_id: "Qwen/Qwen3-0.6B"
base_url: "http://localhost:8000/v1"
seeds: [0, 1, 2]
episodes_per_env: 1
max_turns_per_episode: 100
concurrency: 2
budget_usd: null
envs:
  - atlas_rl/minigrid-empty-5x5-v0
  - atlas_rl/minihack-room-5x5-v0
  - atlas_rl/procgen-coinrun-v0
  - atlas_rl/atari-pong-v0
  - atlas_rl/craftax-classic-v0
harness:
  retry_malformed_n: 3
  recent_actions_window: 5
  trajectory_logging: false
output_dir: "runs/"
pricing_yaml: "pricing.yaml"
dashboard: true
