# NOTE: this config requires 2 GPUs (1 trainer + 1 inference). Local smoke
# skipped on 1-GPU machines. Verified via config load + schema check.

max_steps = 2
seq_len = 4096

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[wandb]
project = "glyphbench-smoke"
name = "smoke"

[ckpt]

[model]
name = "Qwen/Qwen3-0.6B"

[orchestrator]
batch_size = 4
rollouts_per_example = 2

[[orchestrator.train.env]]
id = "glyphbench"
name = "glyphbench-minigrid-5x5"
# Memory-mode example:
# args = { task_id = "glyphbench/minigrid-empty-5x5-v0", num_episodes = 4, n_frames = 4, max_turns = 30, use_memory = true, memory_update_max_tokens = 512 }
args = { task_id = "glyphbench/minigrid-empty-5x5-v0", num_episodes = 4, n_frames = 4, max_turns = 30 }

[orchestrator.train.sampling]
max_completion_tokens = 512
temperature = 0.7
top_p = 0.9

[trainer]

[inference]

[inference.model]
enforce_eager = true

[inference.parallel]
dp = 1
