# --- Inference (vLLM) ---

[inference]
api_server_count = 8
gpu_memory_utilization = 0.85

[inference.model]
# vLLM envelope = max prompt + max completion. With action calls capped at
# 8192 tokens this leaves an implicit 24576-token prompt budget; memory
# calls (4096-token completions) get up to 28672. Matches the trainer-side
# seq_len = 32768 so no rollout segment can be truncated.
max_model_len = 32768

[inference.parallel]
tp = 1
dp = 8         # 1 inference node × 8 GPUs. Adjust for your hardware.
