# Glyphbench RL training: Qwen3.5-4B, 284 trainable envs (atari + craftaxfull
# excluded by policy), memory mode, thinking on.
#
# This toml is cluster-agnostic — no hostnames, IPs, or API keys. Cluster
# wiring (output dir, inference base URL, weight broadcast transport) is
# expected to be supplied via env vars or a sibling cluster.local.toml that
# overrides this one. See README.md in this directory.
#
# Launch (orchestrator side, with the per-env σ monkey-patch installed):
#   uv run python -m glyphbench.rl.orchestrator_patch @ orchestrator.toml
# Trainer side uses the prime-rl trainer entrypoint as usual.

max_steps = 1000
seq_len = 32768
max_async_level = 1

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1
gpus_per_node = 8

[slurm]
# Dummy block required by prime-rl's pydantic validator when deployment.type =
# "multi_node". Has no runtime effect when launching manually (not via
# SLURM); SLURM users should populate this block normally.
job_name = "noop"

[weight_broadcast]
# "filesystem" if the trainer and inference nodes share a path (NFS, sshfs,
# etc.) or if cross-node NCCL sockets are firewalled. "nccl" if both nodes
# can open arbitrary TCP ports to each other. Filesystem mode: trainer
# writes HF safetensors + STABLE marker under run_default/broadcasts/step_N/;
# orchestrator polls and tells vLLM workers to load_weights_from_path.
type = "filesystem"

[wandb]
project = "glyphbench-rl"
name = "qwen35-4b-glyphbench"   # override per run
shared = false       # offline mode requires shared = false
offline = true       # if WANDB_API_KEY isn't set, wandb sync the offline dir post-run

[ckpt]
interval = 100
keep_last = 3
keep_interval = 500

[model]
name = "Qwen/Qwen3.5-4B"

# --- Trainer ---

[trainer.model]
impl = "auto"          # let prime-rl pick custom or hf based on model family
attn = "flash_attention_2"
# Vanilla LM head materialises full logits (vocab × seq × microbatch), which
# OOMs on 80 GB H100 with Qwen3.5-4B's 152K vocab + 16K seq_len. "auto" chunks
# at 8192 tokens/chunk — same numerics, peak mem dropped from >80 GiB to ~23.
fused_lm_head_token_chunk_size = "auto"

[trainer.model.ac]     # activation checkpointing — needed for 16K seq on 4B
mode = "full"
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6
betas1 = 0.9
betas2 = 0.95
weight_decay = 0.0
max_norm = 1.0

[trainer.scheduler]
type = "constant"

[trainer.loss]
type = "custom"
import_path = "glyphbench.rl.loss.sequence_mean_loss"
kwargs = { dppo_mask_low = 0.2, dppo_mask_high = 0.2, adv_tau = 1.0, kl_tau = 1e-3 }

# --- Orchestrator ---

[orchestrator]
# prime-rl semantic: batch_size is TOTAL rollouts per step, NOT unique
# examples. With rollouts_per_example=8 (the GRPO group size), this gives
# batch_size / rollouts_per_example = 256 / 8 = 32 unique tasks per step.
# Total = 256 rollouts per gradient step.
batch_size = 256
rollouts_per_example = 8
oversampling_factor = 1.5
seq_len = 32768

[orchestrator.advantage]
type = "default"  # our monkey-patch on compute_advantages bypasses this; placeholder so validators pass

[[orchestrator.train.env]]
id = "glyphbench"
name = "glyphbench-all"
# Train on every registered env except atari (long-horizon, archived) and
# craftaxfull (full-game Crafter, archived). Surviving suites: classics,
# craftax (subtasks), miniatari, minigrid, minihack, procgen ≈ 284 envs.
# load_environment honours exclude_suites via task_selection.list_task_ids.
args = { exclude_suites = ["atari", "craftaxfull"], num_episodes = 32, n_frames = 0, use_memory = true, memory_update_max_tokens = 4096, max_output_tokens = 8192 }

[orchestrator.train.sampling]
temperature = 1.0
max_completion_tokens = 8192
[orchestrator.train.sampling.extra_body]
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 1.5
chat_template_kwargs = { enable_thinking = true }

# --- Eval (during-training subset; full 292-env sweep is the offline CLI) ---
#
# 30 slots = 5 tasks × 6 surviving training suites, eval'd every 25 grad
# steps. One block per task_id (not a list-form) so the per-task summary
# line is emitted distinctly and visible in the orchestrator log:
#   `Evaluated eval-<suite>-<task> in Xs (Avg@2=..., Truncated: ...)`.
# Tasks were picked across difficulties + mechanics within each suite; tune
# for your own infra by editing or pruning blocks.

[orchestrator.eval]
interval = 25
num_examples = 4
rollouts_per_example = 2

# Reusable args fragment is intentionally inlined per-block: prime-rl's
# orchestrator config schema doesn't support TOML anchors / aliases, so
# duplication is the readable option.

