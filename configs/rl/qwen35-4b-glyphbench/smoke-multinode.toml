# Multi-node smoke — exercises the full 3-node pipeline (trainer FSDP=8 +
# 16 inference workers across 2 nodes) on a SHORT run with the production
# model (Qwen3.5-4B) so the parser path matches.
#
# Differences from production rl.toml:
#   - max_steps = 5 (vs 1000); ckpt + eval intervals shrunk to fire inside
#     the run.
#   - batch_size = 16 (vs 256), rollouts_per_example = 4 (vs 8) — fewer,
#     shorter rollouts.
#   - max_turns capped at 20 per env (vs each env's default), and
#     max_completion_tokens = 2048 (vs 8192). Memory mode stays ON since
#     it's part of what we're verifying.
#   - W&B offline mode (no API key needed).
#
# Launch:
#   bash scripts/rl/launch_smoke_multinode.sh

max_steps = 5
seq_len = 16384
max_async_level = 1

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 2
gpus_per_node = 8

[slurm]
job_name = "noop"  # validator-only placeholder; we launch manually

[weight_broadcast]
type = "nccl"
port = 29501
timeout = 1200

[wandb]
project = "glyphbench-rl-smoke"
name = "smoke-multinode"
shared = false       # offline mode requires shared = false
offline = true

[ckpt]
interval = 2         # checkpoint at step 2 and 4
keep_last = 3

[model]
name = "Qwen/Qwen3.5-4B"

# --- Trainer ---

[trainer.model]
impl = "auto"
attn = "flash_attention_2"

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6
betas1 = 0.9
betas2 = 0.95
weight_decay = 0.0
max_norm = 1.0

[trainer.scheduler]
type = "constant"

[trainer.loss]
type = "custom"
import_path = "glyphbench.rl.loss.sequence_mean_loss"
kwargs = { dppo_mask_low = 0.2, dppo_mask_high = 0.2, adv_tau = 1.0, kl_tau = 1e-3 }

# --- Orchestrator ---

[orchestrator]
batch_size = 16
rollouts_per_example = 4
oversampling_factor = 1.5
seq_len = 16384

[orchestrator.advantage]
type = "default"  # bypassed by glyphbench.rl.orchestrator_patch monkey-patch

[[orchestrator.train.env]]
id = "glyphbench"
name = "glyphbench-smoke"
# task_id intentionally omitted → load_environment defaults to None → all 292 envs
# (but the orchestrator only samples 4 problems per step, so realistically
# only ~5 envs will be touched in this smoke; that's fine for plumbing.)
args = { num_episodes = 4, n_frames = 0, max_turns = 20, use_memory = true, memory_update_max_tokens = 1024, max_output_tokens = 2048 }

[orchestrator.train.sampling]
temperature = 1.0
max_completion_tokens = 2048
[orchestrator.train.sampling.extra_body]
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 1.5
chat_template_kwargs = { enable_thinking = true }

# --- Eval (verifies during-training eval path runs once at step 3) ---

[orchestrator.eval]
interval = 3
num_examples = 2
rollouts_per_example = 1

[[orchestrator.eval.env]]
id = "glyphbench"
name = "smoke-eval-minigrid"
args = { task_id = "glyphbench/minigrid-empty-5x5-v0", num_episodes = 2, n_frames = 0, max_turns = 15, use_memory = true, memory_update_max_tokens = 1024, max_output_tokens = 2048 }

# --- Inference (vLLM) ---

[inference]
api_server_count = 8
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 16384

[inference.parallel]
tp = 1
dp = 16
