# Smoke test — exercises the patched orchestrator + custom loss path on
# a tiny single-env run. Uses Qwen3-0.6B for fast model load.
#
# Run on a SINGLE node with at least 2 GPUs (1 trainer + 1 inference):
#   bash scripts/rl/launch_smoke.sh

max_steps = 2
seq_len = 4096

[deployment]
type = "single_node"
num_train_gpus = 1
num_infer_gpus = 1

[wandb]
project = "glyphbench-rl-smoke"
name = "smoke"

[model]
name = "Qwen/Qwen3-0.6B"

[trainer.loss]
type = "custom"
import_path = "glyphbench.rl.loss.sequence_mean_loss"

[orchestrator]
batch_size = 4
rollouts_per_example = 2

[orchestrator.advantage]
type = "default"  # patched compute_advantages bypasses this

[[orchestrator.train.env]]
id = "glyphbench"
name = "glyphbench-minigrid-5x5-smoke"
args = { task_id = "glyphbench/minigrid-empty-5x5-v0", num_episodes = 4, n_frames = 0, max_turns = 10 }

[orchestrator.train.sampling]
max_completion_tokens = 512
temperature = 0.7

[inference]

[inference.model]
enforce_eager = true

[inference.parallel]
dp = 1
