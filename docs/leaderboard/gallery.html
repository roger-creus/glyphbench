<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlyphBench — Random Rollouts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfbf9;
    --panel: #ffffff;
    --fg: #17171a;
    --fg-soft: #3a3a42;
    --fg-dim: #6e6e76;
    --rule: #e6e3dc;
    --rule-soft: #f1eee7;
    --accent: #0b5d4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
  header { border-bottom: 1px solid var(--rule); padding: 3rem 0 1.6rem; }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600; font-size: 2rem; letter-spacing: -0.01em;
  }
  h1 .bench { font-style: italic; font-weight: 400; }
  .tagline {
    color: var(--fg-soft); font-size: 0.98rem;
    margin-top: 0.6rem; max-width: 62ch;
  }
  nav { display: flex; gap: 1.6rem; margin-top: 1.3rem; font-size: 0.88rem; }
  nav a { color: var(--fg-soft); text-decoration: none; transition: color 0.15s; }
  nav a:hover { color: var(--accent); }
  nav a[target=_blank]::after { content: " ↗"; color: var(--fg-dim); font-size: 0.8em; }

  main { padding: 2rem 0 5rem; }
  .controls {
    display: flex; gap: 0.8rem;
    margin: 0 0 1.4rem; flex-wrap: wrap; align-items: center;
  }
  select, input[type="search"] {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--rule); border-radius: 5px;
    padding: 0.48rem 0.7rem; font-family: inherit; font-size: 0.88rem;
  }
  select:focus, input[type="search"]:focus {
    outline: none; border-color: var(--accent);
  }
  input[type="search"] { min-width: 300px; }
  #count { color: var(--fg-dim); font-size: 0.85rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.1rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card img {
    width: 100%;
    aspect-ratio: 16 / 10;
    object-fit: contain;
    background: #0d0f12;
    display: block;
  }
  .card-body {
    padding: 0.7rem 0.9rem 0.9rem;
    border-top: 1px solid var(--rule-soft);
  }
  .card-body .suite {
    display: inline-block;
    color: var(--accent);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.25rem;
    font-weight: 600;
  }
  .card-body .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--fg);
    word-break: break-all;
    line-height: 1.35;
  }
  .empty {
    background: var(--panel);
    border: 1px dashed var(--rule);
    border-radius: 6px;
    padding: 3rem 2rem;
    text-align: center;
    color: var(--fg-dim);
    grid-column: 1 / -1;
  }
  footer {
    padding: 2.5rem 2rem;
    border-top: 1px solid var(--rule);
    color: var(--fg-dim);
    font-size: 0.85rem;
    text-align: center;
    background: var(--panel);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>Glyph<span class="bench">Bench</span> — Random Rollouts</h1>
    <p class="tagline">A random-agent rollout for each of the 292 environments. Seed 42, played to natural termination under the env's own step budget. Assets served from Hugging Face Datasets.</p>
    <nav>
      <a href="index.html">← Leaderboard</a>
      <a href="https://huggingface.co/datasets/anon-paper-submission/glyphbench-assets" target="_blank">Dataset</a>
      <a href="https://github.com/roger-creus/glyphbench" target="_blank">GitHub</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="controls">
    <input type="search" id="search" placeholder="Filter by env id…" aria-label="Filter by env id">
    <select id="suite-filter">
      <option value="all">All suites</option>
      <option value="minigrid">minigrid</option>
      <option value="minihack">minihack</option>
      <option value="atari">atari</option>
      <option value="procgen">procgen</option>
      <option value="craftax">craftax</option>
      <option value="classics">classics</option>
    </select>
    <span id="count"></span>
  </div>
  <div id="grid" class="grid"></div>
</main>

<footer>
  <p>GlyphBench · <a href="https://huggingface.co/datasets/anon-paper-submission/glyphbench-assets" target="_blank">Assets on Hugging Face</a> · <a href="https://github.com/roger-creus/glyphbench" target="_blank">GitHub</a></p>
</footer>

<script>
const HF_BASE = "https://huggingface.co/datasets/anon-paper-submission/glyphbench-assets/resolve/main/gifs";

async function loadManifest() {
  let manifest;
  try {
    manifest = await (await fetch('gifs_manifest.json')).json();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty">No manifest yet. Run <code>scripts/upload_assets.py</code>.</div>';
    return;
  }
  const suiteOf = eid => eid.split('/')[1].split('-')[0];
  const cards = manifest.map(m => ({
    env_id: m.env_id,
    slug: m.slug,
    suite: suiteOf(m.env_id),
    url: `${HF_BASE}/${m.slug}.gif`,
  }));
  render(cards);
  attachFilters(cards);
}

function render(cards) {
  const grid = document.getElementById('grid');
  grid.innerHTML = cards.map(c => `
    <a class="card" href="${c.url}" target="_blank" data-env="${c.env_id}" data-suite="${c.suite}">
      <img loading="lazy" src="${c.url}" alt="${c.env_id}">
      <div class="card-body">
        <div class="suite">${c.suite}</div>
        <div class="name">${c.env_id.split('/')[1]}</div>
      </div>
    </a>`).join('');
  document.getElementById('count').textContent = `${cards.length} envs`;
}

function attachFilters(cards) {
  const search = document.getElementById('search');
  const suiteFilter = document.getElementById('suite-filter');
  function apply() {
    const q = search.value.toLowerCase(); const s = suiteFilter.value;
    const filtered = cards.filter(c => {
      const matchQ = !q || c.env_id.toLowerCase().includes(q);
      const matchS = s === 'all' || c.suite === s;
      return matchQ && matchS;
    });
    render(filtered);
  }
  search.addEventListener('input', apply);
  suiteFilter.addEventListener('change', apply);
}

loadManifest();
</script>
</body>
</html>
